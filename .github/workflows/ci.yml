on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run:
    name: Upload vsix package
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Install dependencies (macOS)
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: '1'
        run: |
          brew tap chipsalliance/verible
          brew install verible universal-ctags icarus-verilog verilator
        if: runner.os == 'macOS'
      - name: Cache Cargo installs
        if: runner.os == 'Linux'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/veriloghdl-cargo-install-target
          key: ${{ runner.os }}-cargo-install-${{ hashFiles('.github/workflows/ci.yml', '.github/workflows/publish-marketplace.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-install-
      - name: Install dependencies (Ubuntu)
        run: |
          export CARGO_TARGET_DIR="$HOME/.cache/veriloghdl-cargo-install-target"
          sudo apt update
          sudo apt install -y iverilog verilator
          cargo install svls
          cargo install --git https://github.com/vivekmalneedi/veridian.git
        if: runner.os == 'Linux'
      - run: xvfb-run -a npm test
        if: runner.os == 'Linux'
      - run: npm test
        if: runner.os == 'macOS'
      - run: npm run compile-tests
        if: runner.os == 'Windows'
      - run: npm run compile
        if: runner.os == 'Windows'
      - run: npm run test:windows
        if: runner.os == 'Windows'
      - run: npm run compile
        if: runner.os != 'Windows'
      - run: npx @vscode/vsce package
      - name: upload vsix package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: veriloghdl-*.vsix

  windows-wsl2:
    name: Windows WSL2 integration
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Setup WSL2
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          update: 'true'
          additional-packages: verilator
      - name: Verify WSL2 toolchain
        shell: pwsh
        run: |
          wsl --status
          wsl --list --verbose
          wsl -e bash -lc 'set -euxo pipefail; uname -a; command -v wslpath; command -v verilator; verilator --version'
      - run: npm run compile
      - run: npm run compile-tests
      - name: Run WSL2 integration tests
        env:
          VERILOGHDL_RUN_WSL2_TESTS: '1'
        run: npm run test:windows-wsl2
