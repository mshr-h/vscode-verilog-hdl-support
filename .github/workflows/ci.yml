on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run:
    name: Upload vsix package
    strategy:
      matrix:
        include:
          - os: macos-latest
            slang_asset: slang-macos-arm64.tar.gz
            slang_sha256: 6d2f86ffedfefe663c6f55fd77348806faafccd69e71f7359986b0c9604f9187
            slang_server_asset: slang-server-macos.tar.gz
          - os: ubuntu-latest
            slang_asset: slang-linux-x86_64.tar.gz
            slang_sha256: 951a170e10e25e54c91565030acfdfc11c3226714ebf225a18ad4166a898d8a4
            slang_server_asset: slang-server-linux-x64.tar.gz
          - os: windows-latest
            slang_asset: slang-windows-x86_64.zip
            slang_sha256: 23d0a3d052cf88da13acc8b73161d77e3242ffbc630bb0577a3ccda0e4e39d81
            slang_server_asset: slang-server-windows-x64.zip
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      SLANG_VERSION: v11.0
      SLANG_SERVER_VERSION: v0.2.7
      VERIBLE_VERSION: v0.0-4071-g8d9f2c97
      VERIBLE_SHA256: bfa43258d9132797ec9dca2a624395bb83967e18b888803c022d1c9a889203b6
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Setup slang-server
        uses: ./.github/actions/setup-slang-server
        with:
          version: ${{ env.SLANG_SERVER_VERSION }}
          asset: ${{ matrix.slang_server_asset }}
      - name: Cache slang
        id: cache-slang
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/veriloghdl-tools/slang/${{ env.SLANG_VERSION }}/${{ matrix.slang_asset }}
          key: ${{ runner.os }}-slang-${{ env.SLANG_VERSION }}-${{ matrix.slang_asset }}-${{ matrix.slang_sha256 }}
      - name: Install slang (Unix)
        if: runner.os != 'Windows' && steps.cache-slang.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          install_dir="$HOME/.cache/veriloghdl-tools/slang/${SLANG_VERSION}/${{ matrix.slang_asset }}"
          archive="$RUNNER_TEMP/${{ matrix.slang_asset }}"
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "$archive" \
            "https://github.com/MikePopoloski/slang/releases/download/${SLANG_VERSION}/${{ matrix.slang_asset }}"
          echo "${{ matrix.slang_sha256 }}  ${archive}" | shasum -a 256 --check -
          rm -rf "$install_dir"
          mkdir -p "$install_dir"
          tar -xzf "$archive" -C "$install_dir"
          chmod +x "$install_dir/slang"
      - name: Install slang (Windows)
        if: runner.os == 'Windows' && steps.cache-slang.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE ".cache/veriloghdl-tools/slang/$env:SLANG_VERSION/${{ matrix.slang_asset }}"
          $archive = Join-Path $env:RUNNER_TEMP "${{ matrix.slang_asset }}"
          curl.exe -fsSL --retry 3 --retry-delay 5 `
            -o $archive `
            "https://github.com/MikePopoloski/slang/releases/download/$env:SLANG_VERSION/${{ matrix.slang_asset }}"
          $actualHash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actualHash -ne "${{ matrix.slang_sha256 }}") {
            throw "slang archive hash mismatch: expected ${{ matrix.slang_sha256 }}, got $actualHash"
          }
          if (Test-Path $installDir) {
            Remove-Item -Recurse -Force $installDir
          }
          New-Item -ItemType Directory -Force $installDir | Out-Null
          Expand-Archive -LiteralPath $archive -DestinationPath $installDir
      - name: Add slang to PATH
        run: echo "$HOME/.cache/veriloghdl-tools/slang/${SLANG_VERSION}/${{ matrix.slang_asset }}" >> "$GITHUB_PATH"
        if: runner.os != 'Windows'
      - name: Add slang to PATH (Windows)
        shell: pwsh
        run: |
          $installDir = Join-Path $env:USERPROFILE ".cache/veriloghdl-tools/slang/$env:SLANG_VERSION/${{ matrix.slang_asset }}"
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Append
        if: runner.os == 'Windows'
      - name: Verify slang
        run: slang --version
      - name: Cache Verible (macOS)
        id: cache-verible
        if: runner.os == 'macOS'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/veriloghdl-tools/verible/${{ env.VERIBLE_VERSION }}
          key: ${{ runner.os }}-verible-${{ env.VERIBLE_VERSION }}-${{ env.VERIBLE_SHA256 }}
      - name: Install Verible (macOS)
        if: runner.os == 'macOS' && steps.cache-verible.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          install_dir="$HOME/.cache/veriloghdl-tools/verible/${VERIBLE_VERSION}"
          archive="$RUNNER_TEMP/verible-${VERIBLE_VERSION}-macOS.tar.gz"
          extract_dir="$RUNNER_TEMP/verible-${VERIBLE_VERSION}"
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "$archive" \
            "https://github.com/chipsalliance/verible/releases/download/${VERIBLE_VERSION}/verible-${VERIBLE_VERSION}-macOS.tar.gz"
          echo "${VERIBLE_SHA256}  ${archive}" | shasum -a 256 --check -
          rm -rf "$install_dir" "$extract_dir"
          mkdir -p "$(dirname "$install_dir")" "$extract_dir"
          tar -xzf "$archive" -C "$extract_dir"
          mv "$extract_dir/verible-${VERIBLE_VERSION}-macOS" "$install_dir"
      - name: Add Verible to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "$HOME/.cache/veriloghdl-tools/verible/${VERIBLE_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Verify Verible (macOS)
        if: runner.os == 'macOS'
        run: |
          verible-verilog-format --version
          verible-verilog-lint --version
      - name: Install dependencies (macOS)
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: '1'
        run: |
          brew install universal-ctags icarus-verilog verilator
        if: runner.os == 'macOS'
      - name: Cache Cargo installs
        if: runner.os == 'Linux'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/veriloghdl-cargo-install-target
          key: ${{ runner.os }}-cargo-install-${{ hashFiles('.github/workflows/ci.yml', '.github/workflows/publish-marketplace.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-install-
      - name: Install dependencies (Ubuntu)
        run: |
          export CARGO_TARGET_DIR="$HOME/.cache/veriloghdl-cargo-install-target"
          sudo apt update
          sudo apt install -y iverilog verilator
          cargo install svls
          cargo install --git https://github.com/vivekmalneedi/veridian.git
        if: runner.os == 'Linux'
      - run: xvfb-run -a npm test
        if: runner.os == 'Linux'
      - run: npm test
        if: runner.os == 'macOS'
      - run: npm test
        if: runner.os == 'Windows'
      - run: npm run compile
        if: runner.os != 'Windows'
      - run: npx @vscode/vsce package
      - name: upload vsix package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: veriloghdl-*.vsix

  windows-wsl2:
    name: Windows WSL2 integration
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Setup WSL2
        uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          wsl-version: 2
          update: 'true'
          additional-packages: verilator
      - name: Verify WSL2 toolchain
        shell: pwsh
        run: |
          wsl --status
          wsl --list --verbose
          wsl -e bash -lc 'set -euxo pipefail; uname -a; command -v wslpath; command -v verilator; verilator --version'
      - run: npm run compile
      - run: npm run compile-tests
      - name: Run WSL2 integration tests
        env:
          VERILOGHDL_RUN_WSL2_TESTS: '1'
        run: npm run test:windows-wsl2
