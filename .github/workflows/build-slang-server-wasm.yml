name: Build bundled slang-server WASM

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - build/slang-server.lock.json
      - scripts/build-slang-server-wasm.sh
      - scripts/patch-slang-server-wasi.mjs
      - scripts/check-wasm-bundle.mjs
      - .github/workflows/build-slang-server-wasm.yml
  pull_request:
    branches: [ main ]
    paths:
      - build/slang-server.lock.json
      - scripts/build-slang-server-wasm.sh
      - scripts/patch-slang-server-wasi.mjs
      - scripts/check-wasm-bundle.mjs
      - .github/workflows/build-slang-server-wasm.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build
      - name: Cache slang-server WASM build
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: .cache/slang-server-wasm
          key: ${{ runner.os }}-slang-server-wasm-${{ hashFiles('build/slang-server.lock.json', 'scripts/build-slang-server-wasm.sh', 'scripts/patch-slang-server-wasi.mjs') }}
          restore-keys: |
            ${{ runner.os }}-slang-server-wasm-
      - name: Build bundled slang-server WASM
        run: npm run build:slang-wasm
      - name: Verify bundled slang-server WASM
        run: npm run verify:wasm-bundle
      - name: Report artifact
        run: |
          size="$(wc -c < resources/wasm/slang-server.wasm | tr -d ' ')"
          sha="$(sha256sum resources/wasm/slang-server.wasm | awk '{print $1}')"
          {
            echo "## slang-server.wasm"
            echo ""
            echo "- size: ${size} bytes"
            echo "- sha256: ${sha}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slang-server-wasm
          path: |
            resources/wasm/slang-server.wasm
            resources/wasm/slang-server.meta.json
            resources/wasm/licenses/*
