on:
  push:
    tags:
      - "*"

name: Publish extension to marketplace

jobs:
  package:
    name: Test and package extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - run: npm ci
      - name: Cache Cargo installs
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/veriloghdl-cargo-install-target
          key: ${{ runner.os }}-cargo-install-${{ hashFiles('.github/workflows/ci.yml', '.github/workflows/publish-marketplace.yml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-install-
      - name: Install dependencies
        run: |
          export CARGO_TARGET_DIR="$HOME/.cache/veriloghdl-cargo-install-target"
          sudo apt update
          sudo apt install -y iverilog verilator
          cargo install svls
          cargo install --git https://github.com/vivekmalneedi/veridian.git
      - run: xvfb-run -a npm test
      - run: npx @vscode/vsce package
      - name: Prepare VSIX artifact
        run: |
          mkdir -p dist-vsix
          mv veriloghdl-*.vsix dist-vsix/veriloghdl.vsix
      - name: Upload VSIX package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: extension-vsix
          path: dist-vsix/veriloghdl.vsix

  publish-open-vsx:
    name: Publish to Open VSX Registry
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: extension-vsix
          path: dist-vsix
      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: dist-vsix/veriloghdl.vsix

  publish-vscode-marketplace:
    name: Publish to Visual Studio Marketplace
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: extension-vsix
          path: dist-vsix
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          extensionFile: dist-vsix/veriloghdl.vsix
          registryUrl: https://marketplace.visualstudio.com
